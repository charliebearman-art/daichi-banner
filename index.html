(function initDate() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  document.querySelectorAll('.badge-date').forEach(inp => { inp.value = dd + '.' + mm + '.' + yy; });
})();

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Suisse Intl', sans-serif;
  --text-main: #1a1a1a;
  --text-secondary: #6c7684;
  --stroke: #d1d8e1;
  --card-w: 1200px;
  --card-h: 1600px;
  --scale: 0.625; /* 750/1200 */
}

body {
  background: #b0b5be;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 48px;
  font-family: var(--font);
}

/* ── UI ── */
.ui {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.ui-note {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  text-align: center;
  line-height: 1.5;
  font-family: var(--font);
}
.ui-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

/* ── ПЕРЕКЛЮЧАТЕЛЬ ФОТО ── */
.photo-switcher {
  display: flex;
  gap: 10px;
  align-items: center;
}
.photo-switcher-label {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  font-family: var(--font);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 4px;
}
.photo-thumb {
  width: 48px;
  height: 64px;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: border-color 0.15s, transform 0.1s;
  flex-shrink: 0;
  background: #444;
  position: relative;
}
.photo-thumb:hover { transform: scale(1.05); }
.photo-thumb.active { border-color: #fff; }
.photo-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
/* Плейсхолдер для незагруженного фото */
.photo-thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: rgba(255,255,255,0.4);
  background: #555;
}
.btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  padding: 8px 18px;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.8; }
.btn-dark { background: #1a1a1a; color: #fff; }
.btn-light { background: rgba(255,255,255,0.85); color: #333; }

/* ── SCALE WRAPPER ── */
.scale-wrap {
  width: 750px;        /* 1200 × 0.625 */
  height: 1000px;      /* 1600 × 0.625 */
  position: relative;
  flex-shrink: 0;
}
.card-positioner {
  width: var(--card-w);
  height: var(--card-h);
  transform-origin: top left;
  transform: scale(var(--scale));
  position: absolute;
  top: 0; left: 0;
}

/* ── CARD — фиксированный 1200×1600 ── */
.card {
  width: var(--card-w);
  height: var(--card-h);
  position: relative;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 32px 120px rgba(0,0,0,0.25);
}

/* ── ФОТО — абсолютно заполняет весь фрейм ── */
.photo-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.photo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

/* ── КОНТЕНТНЫЙ БЛОК — прижат к низу, высота по контенту ── */
.content-layer {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
}

/* Subtract — фигурный белый элемент слева над контентным блоком */
.subtract-wrap {
  width: 358px;
  height: 355px;
  position: relative;
  pointer-events: none;
  flex-shrink: 0;
  display: block;
  margin-bottom: -3px; /* перекрываем субпиксельный зазор при экспорте */
}
.subtract-wrap svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* Белая панель */
.white-panel {
  width: 100%;
  background: #fff;
  padding: 64px 48px;
  display: flex;
  flex-direction: column;
  gap: 48px;
}

/* ── ЗАГОЛОВОК ── */
.title-block {
  padding: 0 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-align: center;
}
.main-title {
  font-family: var(--font);
  font-size: 72px;
  font-weight: 500;
  line-height: 1.2;
  color: var(--text-main);
  outline: none;
}
.subtitle {
  font-family: var(--font);
  font-size: 32px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-secondary);
  outline: none;
}

/* ── ПРАЙС-ЛИСТ ── */
.price-list {
  padding: 0 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  width: 100%;
  position: relative;
}
.row-model {
  font-family: var(--font);
  font-size: 32px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-main);
  white-space: nowrap;
  /* ширина устанавливается через JS по ширине текста */
  width: auto;
  max-width: 700px;
  min-width: 80px;
  flex-shrink: 0;
  background: transparent;
  border: none;
  outline: none;
}
.row-model::placeholder { color: #ccc; }
.row-dots {
  flex: 1 0 24px;
  min-width: 24px;
  height: 0;
  position: relative;

              <path fill-rule="evenodd" clip-rule="evenodd" d="M28.058 8.27837L43.376 35.0864C45.156 38.2024 42.906 42.0804 39.318 42.0804H8.68201C5.09201 42.0804 2.84201 38.2024 4.62401 35.0864L19.942 8.27837C21.736 5.13637 26.264 5.13637 28.058 8.27837Z" stroke="#FC4242" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

<script>
// ── ФОНОВЫЕ ИЗОБРАЖЕНИЯ ──
// Фото 1: текущее (загружается из Figma или встроено как base64)
// Фото 2: будет добавлено позже — замените PHOTO_2_SRC на путь или base64
// ── ГОРОДА / КРЕАТИВЫ ──
// Единый конфиг. ЧТОБЫ ДОБАВИТЬ ГОРОД: положите картинку в папку cities/
// (JPEG ~1200×1600) и добавьте строку сюда — плитка с подписью появится сама.
const CITIES_DIR = 'cities/';
const CITIES = [
  { name: 'Астрахань',      file: 'astrakhan.jpg' },
  { name: 'Волгоград',      file: 'volgograd.jpg' },
  { name: 'Красноярск',     file: 'krasnoyarsk.jpg' },
  { name: 'Красноярск · 2', file: 'krasnoyarsk-2.jpg' },
  { name: 'Красноярск · 3', file: 'krasnoyarsk-3.jpg' },
  { name: 'Минск',          file: 'minsk.jpg' },
  { name: 'Новосибирск',    file: 'novosibirsk.jpg' },
  { name: 'Уфа',            file: 'ufa.jpg' },
];
function photoSrc(i) { return CITIES[i] ? CITIES_DIR + CITIES[i].file : ''; }
const PHOTO_FALLBACK = 'linear-gradient(180deg,#7ab8ff 0%,#a8b0ff 45%,#d5d0ff 100%)';


let currentPhoto = 0;

// Генерация сетки плиток с подписями городов
function renderCityGrid() {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;
  grid.innerHTML = '';
  CITIES.forEach((city, i) => {
    const label = city.name || ('Креатив ' + (i + 1));
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'city-thumb' + (i === currentPhoto ? ' active' : '');
    btn.title = label;
    btn.onclick = () => switchPhoto(i);

    const box = document.createElement('span');
    box.className = 'city-thumb-img';
    const img = document.createElement('img');
    img.src = photoSrc(i);
    img.alt = label;
    img.loading = 'lazy';
    box.appendChild(img);

    const name = document.createElement('span');
    name.className = 'city-thumb-name';
    name.textContent = label;

    btn.appendChild(box);
    btn.appendChild(name);
    grid.appendChild(btn);
  });
}
renderCityGrid();
switchPhoto(currentPhoto);

function switchPhoto(idx) {
  currentPhoto = idx;
  const img = document.getElementById('photoImg');
  const src = photoSrc(idx);

  // Обновляем активную плитку
  document.querySelectorAll('.city-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  if (!src) {
    img.style.display = 'none';
    img.parentElement.style.background = PHOTO_FALLBACK;
    return;
  }
  img.style.display = '';
  img.src = src;
  img.onerror = function() {
    this.style.display = 'none';
    this.parentElement.style.background = PHOTO_FALLBACK;
  };
}

// ── ROWS ──
const MAX_ROWS = 4;

// ── ROWS ──
function removeRow(btn) {
  const list = document.getElementById('priceList');
  if (list.querySelectorAll('.price-row').length <= 1) return;
  btn.closest('.price-row').remove();
  updateAddBtn();
}

function addRow() {
  const list = document.getElementById('priceList');
  if (list.querySelectorAll('.price-row').length >= MAX_ROWS) return;
  const row = document.createElement('div');
  row.className = 'price-row';
  row.innerHTML = `
    <input class="row-model" type="text" placeholder="Модель кондиционера"/>
    <div class="row-dots"></div>
    <input class="row-price" type="text" placeholder="0 000 ₽"/>
    <button class="row-del export-hide" onclick="removeRow(this)">×</button>
  `;
  list.insertBefore(row, document.getElementById('rowAddBtn'));
  attachPriceFormat(row.querySelector('.row-price'));
  attachAutoWidth(row.querySelector('.row-model'), 700);
  attachAutoWidth(row.querySelector('.row-price'),  252);
  updateAddBtn();
  row.querySelector('.row-model').focus();
}

function updateAddBtn() {
  const count = document.getElementById('priceList').querySelectorAll('.price-row').length;
  document.getElementById('rowAddBtn').style.display = count >= MAX_ROWS ? 'none' : 'flex';
}

// ── SCALE ──
let scaled = true;
const PREVIEW_MAX = 750; // макс. ширина превью на десктопе (1200 × 0.625)

// Масштаб превью: вписываем в ширину экрана, но не больше PREVIEW_MAX
function previewScale() {
  const w = Math.min(PREVIEW_MAX, window.innerWidth - 16);
  return w / 1200;
}

function applyScale() {
  const wrap = document.getElementById('scaleWrap');
  const pos  = document.getElementById('cardPos');
  if (scaled) {
    const s = previewScale();
    wrap.style.width  = (1200 * s) + 'px';
    wrap.style.height = (1600 * s) + 'px';
    pos.style.transform = `scale(${s})`;
    pos.style.position = 'absolute';
    document.documentElement.style.setProperty('--card-scale', s);
  } else {
    wrap.style.width  = '1200px';
    wrap.style.height = '1600px';
    pos.style.transform = 'scale(1)';
    pos.style.position = 'relative';
    document.documentElement.style.setProperty('--card-scale', 1);
  }
}

function toggleScale() {
  scaled = !scaled;
  applyScale();
}

// Пересчёт масштаба при загрузке и повороте/ресайзе экрана
window.addEventListener('resize', () => { if (scaled) applyScale(); });
applyScale();

// ── JPEG EXPORT ──
async function exportJPEG() {
  const btn = document.querySelector('.btn-dark');
  btn.textContent = 'Рендеринг…';
  btn.disabled = true;

  // Ждём шрифты
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 500));

  // Переключаем на 1:1
  const wasScaled = scaled;
  if (wasScaled) toggleScale();
  await new Promise(r => setTimeout(r, 200));

  // Прячем UI-элементы — сохраняем их текущий display перед скрытием
  const exportHideEls = [...document.querySelectorAll('.export-hide')];
  const exportHideDisplays = exportHideEls.map(el => el.style.display);
  exportHideEls.forEach(el => el.style.display = 'none');
  await new Promise(r => setTimeout(r, 100));

  // Сбрасываем скролл всех инпутов перед захватом
  document.querySelectorAll('#cardInner input').forEach(inp => { inp.scrollLeft = 0; inp.blur(); });
  await new Promise(r => setTimeout(r, 50));

  // Собираем стили инпутов до клонирования
  const inputOriginals = [...document.querySelectorAll('#cardInner input[type="text"]')].map(inp => {
    const cs = getComputedStyle(inp);
    // Максимальная ширина зависит от типа поля
    const maxWidth = inp.classList.contains('row-model')  ? '700px' :
                     inp.classList.contains('row-price')  ? '252px' : 'none';
    return {
      fontFamily:    cs.fontFamily,
      fontSize:      cs.fontSize,
      fontWeight:    cs.fontWeight,
      lineHeight:    cs.lineHeight,
      color:         cs.color,
      whiteSpace:    cs.whiteSpace,
      textAlign:     cs.textAlign,
      width:         inp.offsetWidth + 'px',
      maxWidth:      maxWidth,
      paddingBottom: cs.paddingBottom,
      value:         inp.value,
    };
  });

  try {
    const canvas = await html2canvas(document.getElementById('cardInner'), {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: 1200,
      height: 1600,
      windowWidth: 1200,
      logging: false,
      onclone: function(clonedDoc) {
        // Заменяем каждый <input> на <div> с его значением — html2canvas рендерит текст корректно
        const clonedInputs = [...clonedDoc.querySelectorAll('input[type="text"]')];
        clonedInputs.forEach((inp, i) => {
          const orig = inputOriginals[i];
          if (!orig) return;
          const div = clonedDoc.createElement('div');
          div.textContent = orig.value;
          div.style.fontFamily    = orig.fontFamily;
          div.style.fontSize      = orig.fontSize;
          div.style.fontWeight    = orig.fontWeight;
          div.style.lineHeight    = orig.lineHeight;
          div.style.color         = orig.color;
          div.style.whiteSpace    = orig.whiteSpace;
          div.style.textAlign     = orig.textAlign;
          div.style.width         = orig.width;
          div.style.maxWidth      = orig.maxWidth;
          div.style.overflow      = 'hidden';          // ключевой фикс — обрезаем текст
          div.style.textOverflow  = 'ellipsis';
          div.style.paddingBottom = orig.paddingBottom;
          div.style.flexShrink    = '0';
          div.style.display       = 'block';
          inp.parentNode.replaceChild(div, inp);
        });
      }
    });
    await saveCanvas(canvas);
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }

  // Возврат — восстанавливаем исходный display
  exportHideEls.forEach((el, i) => el.style.display = exportHideDisplays[i]);
  if (wasScaled) toggleScale();
  btn.textContent = '💾 Сохранить JPEG';
  btn.disabled = false;
}

// ── СОХРАНЕНИЕ КАРТИНКИ (кросс-платформенно, включая iOS Safari) ──
function isIOS() {
  return /iP(hone|od|ad)/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function saveCanvas(canvas) {
  return new Promise(resolve => {
    canvas.toBlob(blob => {
      const fileName = 'specprice_daichi.jpg';
      if (!blob) { // крайний фолбэк
        showSaveOverlay(canvas.toDataURL('image/jpeg', 0.95), null);
        return resolve();
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      // Десктоп: обычное скачивание. iOS игнорирует download → идём в оверлей.
      if (('download' in a) && !isIOS()) {
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 10000);
        return resolve();
      }
      const file = new File([blob], fileName, { type: 'image/jpeg' });
      const canShare = !!(navigator.canShare && navigator.canShare({ files: [file] }));
      showSaveOverlay(url, canShare ? file : null);
      resolve();
    }, 'image/jpeg', 0.95);
  });
}

// Оверлей с готовой картинкой — для сохранения на телефоне
function showSaveOverlay(imgUrl, shareFile) {
  const ov = document.createElement('div');
  ov.className = 'save-overlay';

  const box = document.createElement('div');
  box.className = 'save-box';

  const hint = document.createElement('p');
  hint.className = 'save-hint';
  hint.textContent = shareFile
    ? 'Нажмите «Сохранить в Фото» — или удерживайте картинку и выберите «Добавить в фото».'
    : 'Удерживайте картинку и выберите «Добавить в фото».';

  const img = document.createElement('img');
  img.className = 'save-img';
  img.src = imgUrl;

  const btns = document.createElement('div');
  btns.className = 'save-btns';

  if (shareFile) {
    const shareBtn = document.createElement('button');
    shareBtn.className = 'btn btn-dark';
    shareBtn.textContent = '📤 Сохранить в Фото';
    shareBtn.onclick = async () => {
      try { await navigator.share({ files: [shareFile] }); } catch (e) {}
    };
    btns.appendChild(shareBtn);
  }

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn btn-light';
  closeBtn.textContent = 'Закрыть';
  closeBtn.onclick = () => {
    ov.remove();
    if (imgUrl.startsWith('blob:')) URL.revokeObjectURL(imgUrl);
  };
  btns.appendChild(closeBtn);

  box.appendChild(hint);
  box.appendChild(img);
  box.appendChild(btns);
  ov.appendChild(box);
  document.body.appendChild(ov);
}

// ── ФОРМАТЫ ВВОДА ──
function attachPriceFormat(inp) {
  inp.addEventListener('keydown', function(e) {
    if (e.ctrlKey || e.metaKey) return; // не мешаем copy/paste/select-all
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter','Home','End'];
    if (!allowed.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
    if (e.key === 'Enter') this.blur();
  });
  inp.addEventListener('paste', function(e) {
    e.preventDefault();
    const t = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
    if (t) { this.value = t; this.blur(); }
  });
  inp.addEventListener('focus', function() {
    this.value = this.value.replace(/[^\d]/g,'') || '';
  });
  inp.addEventListener('blur', function() {
    const n = parseInt(this.value.replace(/\D/g,''));
    this.value = (!isNaN(n) && n > 0) ? n.toLocaleString('ru-RU') + ' ₽' : '';
  });
}
document.querySelectorAll('.row-price').forEach(attachPriceFormat);

// ── AUTO-WIDTH: инпут принимает ширину своего текста ──
// Скрытый span-измеритель
const _sizer = document.createElement('span');
_sizer.style.cssText = 'visibility:hidden;position:fixed;top:0;left:0;white-space:pre;pointer-events:none;';
document.body.appendChild(_sizer);

function syncInputWidth(inp, maxPx) {
  const cs = getComputedStyle(inp);
  _sizer.style.font         = cs.font;
  _sizer.style.letterSpacing = cs.letterSpacing;
  // измеряем либо значение, либо плейсхолдер
  _sizer.textContent = inp.value || inp.placeholder || '';
  const w = Math.min(_sizer.offsetWidth + 4, maxPx);
  inp.style.width = Math.max(w, parseInt(cs.minWidth) || 60) + 'px';
}

function attachAutoWidth(inp, maxPx) {
  const sync = () => syncInputWidth(inp, maxPx);
  inp.addEventListener('input', sync);
  inp.addEventListener('focus', sync);
  inp.addEventListener('blur',  sync);
  // запуск после рендера шрифтов
  document.fonts.ready.then(sync);
  requestAnimationFrame(sync);
}

// Вешаем на все существующие поля
document.querySelectorAll('.row-model').forEach(inp => attachAutoWidth(inp, 700));
document.querySelectorAll('.row-price').forEach(inp  => attachAutoWidth(inp, 252));

// Enter в поле модели → переход к цене
document.querySelectorAll('.row-model').forEach(inp => {
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      this.closest('.price-row').querySelector('.row-price').focus();
    }
  });
});

// Маска даты dd.mm.yy
document.querySelectorAll('.badge-date').forEach(inp => {
  inp.addEventListener('keydown', function(e) {
    if (e.ctrlKey || e.metaKey) return; // не мешаем copy/paste/select-all
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
    if (!allowed.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
  });
  inp.addEventListener('input', function() {
    let d = this.value.replace(/\D/g,'').slice(0,6);
    let out = d.slice(0,2);
    if (d.length > 2) out += '.' + d.slice(2,4);
    if (d.length > 4) out += '.' + d.slice(4,6);
    this.value = out;
  });
});
